<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ejercicio 4 — Tarjeta de producto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="card">

    <!-- CAMBIO 1: etiqueta en esquina superior derecha -->
    <span class="etiqueta">OFERTA</span>

    <div class="img-placeholder">Imagen del producto</div>

    <div class="body">
      <div class="category">Electrónica</div>
      <div class="name">Audífonos Pro X</div>

      <!-- CAMBIO 2: precio original tachado + precio rebajado -->
      <div class="precios">
        <span class="precio-original">$120.000</span>
        <span class="precio">$89.900</span>
      </div>

      <button>Agregar al carrito</button>
    </div>

  </div>
</body>
</html>
